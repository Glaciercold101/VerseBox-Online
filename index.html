<style>
*{box-sizing:border-box}
:root{
  --bg:#ffffff; --text:#18181b; --muted:#71717a; --border:#e4e4e7;
  --card:#ffffff; --card-alt:#fcfcfd; --shadow:0 8px 24px rgba(0,0,0,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0b0f; --text:#e4e4e7; --muted:#a1a1aa; --border:#27272a;
    --card:#12121a; --card-alt:#0f0f15; --shadow:0 8px 24px rgba(0,0,0,.5);
  }
}
html{scroll-behavior:smooth}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.topbar{max-width:1200px;margin:0 auto;padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.site-logo{display:inline-flex;gap:4px;padding:8px 10px;border-radius:10px;background:var(--card-alt);border:1px solid var(--border)}
.site-logo span{width:12px;height:12px;border-radius:50%;display:block}
.site-logo span:nth-child(1){background:#e11d48} .site-logo span:nth-child(2){background:#facc15} .site-logo span:nth-child(3){background:#2563eb}
.theme-hint{font-size:12px;color:var(--muted)}
.hero{text-align:center;padding:10px 20px 30px}
h1.title{margin:14px auto 8px;font-size:clamp(28px,5vw,42px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(90deg,#2563eb,#7c3aed,#e11d48);-webkit-background-clip:text;background-clip:text;color:transparent}
.subtitle{margin:8px 0 22px;color:var(--muted);font-size:18px}
.search-wrap{max-width:560px;margin:0 auto;position:relative}
#search{width:100%;padding:14px 16px 14px 44px;border:1px solid var(--border);border-radius:12px;font-size:16px;outline:none;background:var(--card);color:var(--text)}
#search:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.18)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.55;color:var(--muted)}
main{max-width:1000px;margin:0 auto;padding:10px 20px 70px}
.app-row{border:2px solid var(--border);border-left:5px solid var(--app-color,#2563eb);background:var(--card);margin-bottom:26px;overflow:hidden;transition:box-shadow .18s,transform .18s;border-radius:10px}
.app-row:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.app-title-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;color:var(--text);font-weight:650;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap}
.app-icon{font-size:20px}
.app-name{white-space:nowrap;font-size:16px;font-weight:700}
.version-badge{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card-alt);border:1px solid var(--border);color:var(--muted);margin-left:6px;font-weight:600}
.app-desc{opacity:.85;font-weight:450;font-size:14px;margin-left:6px;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:120px}
.copy-link{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;font-size:14px}
.copy-link:hover{color:#2563eb;background:var(--card-alt)}
.app-body{display:grid;grid-template-columns:1fr 300px;min-height:110px}
.app-updates{padding:16px 18px;display:flex;flex-direction:column;gap:7px}
.app-updates a{color:var(--text);text-decoration:none;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;border-bottom:1px dashed var(--border);width:fit-content}
.app-updates a:hover{color:#2563eb;border-bottom-color:#2563eb}
.app-updates .empty{color:var(--muted);font-style:italic;font-size:14px}
.app-download{border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px;gap:8px;background:var(--card-alt)}
.latest-btn{background:#18181b;color:#fff;padding:12px 20px;border-radius:10px;text-decoration:none;font-weight:650;font-size:15px;min-width:180px;text-align:center;display:inline-block;transition:background .15s}
.latest-btn:hover{background:#000}
.latest-btn.disabled{background:#3f3f46;cursor:not-allowed;opacity:.7;pointer-events:none}
.latest-meta{font-size:12px;color:var(--muted);text-align:center}
.screenshots{display:flex;gap:10px;padding:14px 16px;background:var(--card-alt);border-top:1px solid var(--border);overflow-x:auto}
.screenshot{flex:0 0 auto;width:240px;height:135px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:transform .15s}
.screenshot img{width:100%;height:100%;object-fit:cover;display:block}
.screenshot:hover{transform:scale(1.03)}
.screenshot.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;border-style:dashed;background:var(--card-alt)}
footer{text-align:center;padding:36px 20px 60px;color:var(--muted);font-size:14px;border-top:1px solid var(--border)}
#toTop{position:fixed;bottom:20px;right:20px;background:#18181b;color:#fff;border:none;border-radius:999px;width:44px;height:44px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);z-index:100}
#toTop.show{display:flex}
#toTop:hover{background:#000}
@media(max-width:720px){.app-body{grid-template-columns:1fr}.app-download{border-left:none;border-top:1px solid var(--border)}.app-desc{margin-left:0;width:100%}.screenshots{padding:12px}.screenshot{width:200px;height:112px}}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
#lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
#lightbox.show{display:flex}
</style>

const list = document.getElementById('appList');
const search = document.getElementById('search');
const lightbox = document.getElementById('lightbox');
const toTop = document.getElementById('toTop');
document.getElementById('year').textContent = new Date().getFullYear();

function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function openLightbox(src){lightbox.querySelector('img').src=src;lightbox.classList.add('show')}
function copyLink(id){
  const url = location.origin + location.pathname + '#' + id;
  navigator.clipboard.writeText(url).then(()=>{
    const btn = document.querySelector(`#${id} .copy-link`);
    if(btn){const t=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=t,1200)}
  });
}

function render(q=''){
  const term = q.toLowerCase().trim();
  const filtered = APPS.filter(a => (a.name+' '+a.description).toLowerCase().includes(term));
  if(!filtered.length){
    list.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">No apps found.</p>';
    return;
  }
  list.innerHTML = filtered.map(app=>{
    const [latest,...older] = app.downloads || [];
    const id = 'app-'+slugify(app.name);
    const versionBadge = app.version ? `<span class="version-badge">${app.version}</span>` : '';
    const hasUrl = latest && latest.url;
    const latestBtn = hasUrl 
      ? `<a class="latest-btn" href="${latest.url}" target="_blank" rel="noopener" aria-label="Download ${app.name} latest">${latest.platform.includes('Latest')?'Download Latest':'Download'}</a>`
      : `<span class="latest-btn disabled" aria-disabled="true">Coming soon</span>`;
    const latestMeta = hasUrl ? latest.platform : 'No file yet';
    const shots = (app.screenshots||[]).slice(0,3);
    const shotsHtml = shots.length 
      ? shots.map(s=>`<div class="screenshot" onclick="openLightbox('${s}')"><img src="${s}" alt="${app.name} screenshot" loading="lazy" onerror="this.onerror=null;this.parentElement.classList.add('empty');this.parentElement.textContent='Image missing'"></div>`).join('')
      : `<div class="screenshot empty">Add up to 3 screenshots</div>`;
    const olderHtml = older.length 
      ? older.filter(d=>d.url).map(d=>`<a href="${d.url}" target="_blank" rel="noopener">&lt; ${d.platform} &gt;</a>`).join('')
      : '<span class="empty">No previous updates</span>';
    return `<article class="app-row" id="${id}" style="--app-color:${app.color};border-color:${app.color}">
      <div class="app-title-bar">
        <span class="app-icon" aria-hidden="true">${app.icon}</span>
        <span class="app-name">${app.name}</span>
        ${versionBadge}
        <span class="app-desc">${app.description}</span>
        <button class="copy-link" onclick="copyLink('${id}')" title="Copy link" aria-label="Copy link to ${app.name}">🔗</button>
      </div>
      <div class="app-body">
        <div class="app-updates">${olderHtml}</div>
        <div class="app-download">${latestBtn}<div class="latest-meta">${latestMeta}</div></div>
      </div>
      <div class="screenshots">${shotsHtml}</div>
    </article>`;
  }).join('');
  if(location.hash){document.querySelector(location.hash)?.scrollIntoView({behavior:'smooth',block:'start'})}
}

let timer;
const saved = localStorage.getItem('lovely-search') || '';
if(saved){search.value = saved}
search.addEventListener('input', e=>{
  clearTimeout(timer);
  const v = e.target.value;
  localStorage.setItem('lovely-search', v);
  timer = setTimeout(()=>render(v), 180);
});

window.addEventListener('scroll', ()=>{ window.scrollY > 400 ? toTop.classList.add('show') : toTop.classList.remove('show') });
toTop.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));

render(saved);
</script>
