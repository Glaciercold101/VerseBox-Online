<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lovely Apps - I love them.</title>
<style>
*{box-sizing:border-box}:root{--bg:#fff;--text:#18181b;--muted:#71717a;--border:#e4e4e7}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.topbar{max-width:1200px;margin:0 auto;padding:18px 20px 0}
.site-logo{display:inline-flex;gap:4px;padding:8px 10px;border-radius:10px;background:#fafafa;border:1px solid #f1f1f3}
.site-logo span{width:12px;height:12px;border-radius:50%;display:block}
.site-logo span:nth-child(1){background:#e11d48} .site-logo span:nth-child(2){background:#facc15} .site-logo span:nth-child(3){background:#2563eb}
.hero{text-align:center;padding:10px 20px 30px}
.title-image{display:block;margin:14px auto 8px;width:92%;max-width:700px;height:auto}
.subtitle{margin:8px 0 22px;color:#52525b;font-size:18px}
.search-wrap{max-width:560px;margin:0 auto;position:relative}
#search{width:100%;padding:14px 16px 14px 44px;border:1px solid #d4d4d8;border-radius:12px;font-size:16px;outline:none;background:#fff}
#search:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.55}
main{max-width:1000px;margin:0 auto;padding:10px 20px 70px}
.app-row{border:2px solid;background:#fff;margin-bottom:26px;overflow:hidden;transition:box-shadow .18s,transform .18s}
.app-row:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-1px)}
.app-row:nth-child(3n+1){border-color:#2563eb}
.app-row:nth-child(3n+2){border-color:#dc2626}
.app-row:nth-child(3n){border-color:#7f1d1d}
.app-title-bar{display:flex;align-items:center;gap:10px;padding:11px 14px;color:#fff;font-weight:650}
.app-icon{font-size:20px}
.app-name{white-space:nowrap;font-size:16px}
.app-desc{opacity:.92;font-weight:450;font-size:14px;margin-left:6px;overflow:hidden;text-overflow:ellipsis}
.app-body{display:grid;grid-template-columns:1fr 300px;min-height:110px}
.app-updates{padding:16px 18px;display:flex;flex-direction:column;gap:7px}
.app-updates a{color:#0f172a;text-decoration:none;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;border-bottom:1px dashed #e4e4e7;width:fit-content}
.app-updates a:hover{color:#2563eb;border-bottom-color:#2563eb}
.app-updates .empty{color:#a1a1aa;font-style:italic;font-size:14px}
.app-download{border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px;gap:8px;background:#fcfcfd}
.latest-btn{background:#18181b;color:#fff;padding:12px 20px;border-radius:10px;text-decoration:none;font-weight:650;font-size:15px;min-width:180px;text-align:center}
.latest-btn:hover{background:#000}
.latest-meta{font-size:12px;color:var(--muted);text-align:center}
footer{text-align:center;padding:36px 20px 60px;color:#71717a;font-size:14px;border-top:1px solid #f4f4f5}
@media(max-width:720px){.app-body{grid-template-columns:1fr}.app-download{border-left:none;border-top:1px solid var(--border)}.app-desc{margin-left:30px;width:100%}}
</style>
</head>
